name: Scrape Strava Club

on:
  # Tự động chạy 2 lần/ngày: 8:00 và 20:00 giờ Việt Nam (UTC+7)
  schedule:
    - cron: '0 1 * * *'   # 8:00 VN (01:00 UTC)
    - cron: '0 13 * * *'  # 20:00 VN (13:00 UTC)
  # Chạy thủ công từ GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        env:
          STRAVA_CLUB_ID: ${{ secrets.STRAVA_CLUB_ID }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SCRAPE_IMPORT_SECRET: ${{ secrets.SCRAPE_IMPORT_SECRET }}
          CHALLENGE_ID: ${{ secrets.CHALLENGE_ID }}
        run: python3 strava_club_scraper.py
